<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart — Lucky Kidies</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&family=Fraunces:wght@500;600&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<style>
  :root{--pink:#E91E78;--pink-soft:#FFD9EA;--ink:#1B1B1F;--cloud:#FFFBFD;--gold:#C9A66B;--glass:rgba(255,255,255,0.55);--glass-border:rgba(255,255,255,0.7);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Outfit',sans-serif;color:var(--ink);background:var(--cloud);overflow-x:hidden;}
  .blobs{position:fixed;inset:0;z-index:-1;overflow:hidden;}
  .blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:0.5;}
  .blob1{width:420px;height:420px;background:var(--pink-soft);top:-120px;left:-100px;}
  .blob2{width:380px;height:380px;background:var(--gold);opacity:0.25;top:200px;right:-140px;}
  .blob3{width:500px;height:500px;background:var(--pink-soft);bottom:-200px;left:30%;opacity:0.4;}

  nav{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:18px 48px;background:var(--glass);backdrop-filter:blur(18px) saturate(160%);border-bottom:1px solid var(--glass-border);}
  .logo{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:30px;background:linear-gradient(100deg,var(--ink) 0%,var(--ink) 35%,var(--pink) 60%,var(--pink) 100%);-webkit-background-clip:text;background-clip:text;color:transparent;text-decoration:none;}
  .logo span{font-family:'Outfit',sans-serif;font-style:normal;font-size:13px;letter-spacing:3px;color:var(--ink);display:block;margin-top:-4px;}
  .cart-pill{display:flex;align-items:center;gap:8px;background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(10px);padding:9px 16px;border-radius:999px;font-size:14px;font-weight:500;text-decoration:none;color:var(--ink);}

  .page-header{padding:60px 48px 40px;text-align:center;}
  .page-header h1{font-family:'Fraunces',serif;font-size:36px;font-weight:600;}
  .page-header p{color:#888;margin-top:8px;font-size:15px;}

  .cart-layout{max-width:900px;margin:0 auto;padding:0 48px 80px;display:grid;grid-template-columns:1fr 320px;gap:32px;align-items:start;}
  .cart-items{display:flex;flex-direction:column;gap:16px;}

  .cart-item{display:grid;grid-template-columns:90px 1fr auto;gap:16px;align-items:center;background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:20px;padding:16px;}
  .cart-item img{width:90px;height:90px;object-fit:cover;border-radius:14px;}
  .item-info h3{font-size:15px;font-weight:500;margin-bottom:4px;}
  .item-info .condition{font-size:11px;letter-spacing:1px;padding:2px 10px;border-radius:999px;display:inline-block;margin-bottom:8px;}
  .condition-thrift{background:rgba(201,166,107,0.18);color:#8a6d3b;}
  .condition-new{background:rgba(233,30,120,0.14);color:#a3185e;}
  .item-info .price{font-size:16px;font-weight:600;color:var(--pink);}
  .item-controls{display:flex;flex-direction:column;align-items:flex-end;gap:12px;}
  .qty-controls{display:flex;align-items:center;background:var(--glass);border:1px solid var(--glass-border);border-radius:999px;overflow:hidden;}
  .qty-btn{width:32px;height:32px;border:none;background:transparent;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .qty-btn:hover{background:rgba(233,30,120,0.1);}
  .qty-display{min-width:30px;text-align:center;font-weight:600;font-size:14px;}
  .remove-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:20px;padding:4px;transition:color .2s;}
  .remove-btn:hover{color:#e91e78;}

  .cart-summary{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:24px;padding:28px;position:sticky;top:100px;}
  .cart-summary h2{font-family:'Fraunces',serif;font-size:22px;margin-bottom:24px;}
  .summary-row{display:flex;justify-content:space-between;font-size:14px;color:#555;margin-bottom:12px;}
  .summary-row.total{font-size:18px;font-weight:700;color:var(--ink);border-top:1px solid var(--glass-border);padding-top:16px;margin-top:8px;}
  .checkout-btn{width:100%;margin-top:20px;padding:16px;border-radius:999px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--pink),#a3185e);color:#fff;font-size:16px;font-weight:600;font-family:'Outfit',sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;transition:transform .2s,box-shadow .2s;text-decoration:none;}
  .checkout-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(233,30,120,0.35);}
  .continue-link{display:block;text-align:center;margin-top:14px;font-size:13px;color:#888;text-decoration:none;}
  .continue-link:hover{color:var(--pink);}
  .clear-btn{width:100%;margin-top:10px;padding:12px;border-radius:999px;border:1px solid rgba(220,38,38,0.25);background:rgba(220,38,38,0.06);color:#dc2626;font-size:14px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s;}
  .clear-btn:hover{background:rgba(220,38,38,0.12);}

  .empty-cart{text-align:center;padding:80px 48px;grid-column:1/-1;}
  .empty-cart i{font-size:56px;color:#ddd;display:block;margin-bottom:20px;}
  .empty-cart h2{font-family:'Fraunces',serif;font-size:26px;margin-bottom:10px;}
  .empty-cart p{color:#888;margin-bottom:28px;}
  .shop-btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:999px;background:linear-gradient(135deg,var(--pink),#a3185e);color:#fff;text-decoration:none;font-weight:600;}

  @media(max-width:700px){
    nav{padding:16px 20px;}
    .page-header{padding:40px 20px 24px;}
    .cart-layout{grid-template-columns:1fr;padding:0 20px 60px;}
    .cart-summary{position:static;}
    .cart-item{grid-template-columns:70px 1fr auto;}
    .cart-item img{width:70px;height:70px;}
  }
</style>
</head>
<body>

<div class="blobs">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>

<nav>
  <a href="/" class="logo">Lucky Kidies<span>WEARS</span></a>
  <a href="/cart.html" class="cart-pill">
    <i class="ti ti-shopping-bag"></i> Cart · <span id="cart-count">0</span>
  </a>
</nav>

<div class="page-header">
  <h1>Your Cart</h1>
  <p id="cart-subtitle"></p>
</div>

<div id="cart-root"></div>

<script>
  function formatPrice(p){ return '₦' + p.toLocaleString('en-NG'); }
  function getCart(){ return JSON.parse(localStorage.getItem('lk_cart') || '[]'); }
  function saveCart(cart){ localStorage.setItem('lk_cart', JSON.stringify(cart)); }

  function showToast(msg) {
    let toast = document.getElementById('cart-toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'cart-toast';
      toast.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:#1B1B1F;color:#fff;padding:14px 28px;border-radius:999px;font-size:14px;font-weight:500;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;font-family:Outfit,sans-serif;';
      document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.style.transform = 'translateX(-50%) translateY(0)';
    setTimeout(() => toast.style.transform = 'translateX(-50%) translateY(100px)', 2800);
  }

  function updateCartCount(cart){
    document.getElementById('cart-count').textContent = cart.reduce((s,i) => s+i.quantity, 0);
  }

 function changeQty(id, delta) {
  const cart = getCart();
  const item = cart.find(i => i.id === id);
  if (!item) return;

  const newQty = item.quantity + delta;

  if (newQty < 1) return;

  if (item.stock && newQty > item.stock) {
    showToast(`Only ${item.stock} available in stock!`);
    return;
  }

  item.quantity = newQty;
  saveCart(cart);
  renderCart();
}

  function removeItem(id){
    saveCart(getCart().filter(i => i.id !== id));
    renderCart();
  }

  function clearCart(){
    if(!confirm('Clear all items from your cart?')) return;
    localStorage.removeItem('lk_cart');
    renderCart();
  }

  function renderCart(){
    const cart = getCart();
    updateCartCount(cart);
    const root = document.getElementById('cart-root');

    if(cart.length === 0){
      document.getElementById('cart-subtitle').textContent = '';
      root.innerHTML = `
        <div class="empty-cart">
          <i class="ti ti-shopping-bag"></i>
          <h2>Your cart is empty</h2>
          <p>Looks like you haven't added anything yet.</p>
          <a href="/" class="shop-btn"><i class="ti ti-arrow-left"></i> Start Shopping</a>
        </div>`;
      return;
    }

    const subtotal = cart.reduce((s,i) => s + i.price * i.quantity, 0);
    const itemCount = cart.reduce((s,i) => s + i.quantity, 0);
    document.getElementById('cart-subtitle').textContent = `${itemCount} item${itemCount > 1 ? 's' : ''} in your cart`;

    root.innerHTML = `
      <div class="cart-layout">
        <div class="cart-items">
          ${cart.map(item => `
            <div class="cart-item">
              <img src="${item.image_url}" alt="${item.name}">
              <div class="item-info">
                <span class="condition condition-${item.condition}">${item.condition.toUpperCase()}</span>
                <h3>${item.name}</h3>
                <div class="price">${formatPrice(item.price)}</div>
              </div>
              <div class="item-controls">
                <button class="remove-btn" onclick="removeItem(${item.id})"><i class="ti ti-trash"></i></button>
                <div class="qty-controls">
                  <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
                  <span class="qty-display">${item.quantity}</span>
                  <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
        <div class="cart-summary">
          <h2>Order Summary</h2>
          <div class="summary-row"><span>Subtotal (${itemCount} items)</span><span>${formatPrice(subtotal)}</span></div>
          <div class="summary-row"><span>Delivery</span><span>Calculated at checkout</span></div>
          <div class="summary-row total"><span>Total</span><span>${formatPrice(subtotal)}</span></div>
          <a href="/checkout.html" class="checkout-btn"><i class="ti ti-lock"></i> Proceed to Checkout</a>
          <a href="/" class="continue-link">← Continue Shopping</a>
          <button class="clear-btn" onclick="clearCart()"><i class="ti ti-trash"></i> Clear Cart</button>
        </div>
      </div>`;
  }

  renderCart();
</script>
</body>
</html>
